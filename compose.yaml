services:
  postgres:
    image: postgres:16
    container_name: postgres-lab
    environment:
      POSTGRES_DB: postgres
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin123
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./.postgres/init:/docker-entrypoint-initdb.d

  minio:
    image: minio/minio:latest
    container_name: minio-lab
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: admin
      MINIO_ROOT_PASSWORD: admin12345
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data

  minio-init:
    image: minio/mc:latest
    depends_on:
      - minio
    entrypoint:
      - /bin/sh
      - -c
      - |
        until mc alias set local http://minio:9000 admin admin12345; do sleep 2; done
        mc mb -p local/lakehouse || true
        exit 0

  nessie:
    image: ghcr.io/projectnessie/nessie:latest
    container_name: nessie
    ports:
      - "19120:19120"
    environment:
      QUARKUS_HTTP_PORT: 19120
      NESSIE_VERSION_STORE_TYPE: JDBC
      QUARKUS_DATASOURCE_JDBC_URL: jdbc:postgresql://postgres:5432/nessie
      QUARKUS_DATASOURCE_USERNAME: admin
      QUARKUS_DATASOURCE_PASSWORD: admin123
    depends_on:
      - postgres

  trino:
    image: trinodb/trino:477
    container_name: trino-single
    ports:
      - "8080:8080"
    volumes:
      - ./single/etc:/etc/trino
    depends_on:
      - nessie
      - minio-init

volumes:
  postgres_data:
  minio_data:
