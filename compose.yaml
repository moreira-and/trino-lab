services:
  postgres:
    image: postgres:16
    container_name: postgres-lab
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "${POSTGRES_PORT}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./.postgres/init:/docker-entrypoint-initdb.d

  minio:
    image: minio/minio:latest
    container_name: minio-lab
    command: server /data --console-address ":${MINIO_CONSOLE_PORT}"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    ports:
      - "${MINIO_PORT}:9000"
      - "${MINIO_CONSOLE_PORT}:${MINIO_CONSOLE_PORT}"
    volumes:
      - minio_data:/data

  minio-init:
    image: minio/mc:latest
    depends_on:
      - minio
    entrypoint:
      - /bin/sh
      - -c
      - |
        until mc alias set local http://${MINIO_HOST}:${MINIO_PORT} ${MINIO_ROOT_USER} ${MINIO_ROOT_PASSWORD}; do sleep 2; done
        mc mb -p local/lakehouse || true
        exit 0

  nessie:
    image: ghcr.io/projectnessie/nessie:latest
    container_name: nessie
    ports:
      - "${NESSIE_PORT}:${NESSIE_HTTP_PORT}"
    environment:
      QUARKUS_HTTP_PORT: ${NESSIE_HTTP_PORT}
      NESSIE_VERSION_STORE_TYPE: ${NESSIE_VERSION_STORE_TYPE}
      QUARKUS_DATASOURCE_JDBC_URL: ${NESSIE_DATASOURCE_JDBC_URL}
      QUARKUS_DATASOURCE_USERNAME: ${NESSIE_DATASOURCE_USERNAME}
      QUARKUS_DATASOURCE_PASSWORD: ${NESSIE_DATASOURCE_PASSWORD}
    depends_on:
      - postgres

  trino:
    image: trinodb/trino:${TRINO_VERSION}
    container_name: trino-single
    ports:
      - "${TRINO_SINGLE_PORT}:8080"
    volumes:
      - ./single/etc:/etc/trino
    depends_on:
      - nessie
      - minio-init

volumes:
  postgres_data:
  minio_data:
