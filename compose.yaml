services:
  trino-single:
    image: trinodb/trino:${TRINO_VERSION:-477}
    container_name: trino-single
    hostname: trino-single

    depends_on:
      - postgres

    ports:
      - "8080:8080"

    volumes:
      - ./single/etc:/etc/trino
      - ./.codespaces/trino:/data/trino

    restart: unless-stopped

  postgres:
    image: postgres:16
    container_name: postgres-lab
    hostname: postgres-lab

    environment:
      POSTGRES_DB: lab
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin123

    ports:
      - "5432:5432"

    volumes:
      - ./.codespaces/postgres:/var/lib/postgresql/data

    restart: unless-stopped
